services:
  raspap:
    container_name: raspap
    image: ghcr.io/raspap/raspap-docker:latest
    ports:
      - "8081:8081"
    privileged: true
    network_mode: host
    cgroup: host
    env_file: ".env"
    cap_add:
      - SYS_ADMIN
    volumes:
      - /sys/fs/cgroup:/sys/fs/cgroup:rw
      - ./raspap/config:/etc/raspap             # Auth and Web GUI settings
      - ./raspap/hostapd:/etc/hostapd           # Wireless AP (SSID/Password)
      - ./raspap/dnsmasq:/etc/dnsmasq.d         # DHCP and DNS settings
    restart: unless-stopped
