services:
  http-s-proxy:
    container_name: http-s-proxy
    build: .
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
    restart: unless-stopped

  dns-filter:
    container_name: dns-filter
    build:
      context: .
      dockerfile: Dockerfile.dns
    # Host port 5300 because :53 is usually taken on Kali by
    # systemd-resolved (127.0.0.53) or NetworkManager's dnsmasq.
    # iptables REDIRECT in run.sh rewrites victim DNS to this port.
    ports:
      - "5300:53/udp"
      - "5300:53/tcp"
    restart: unless-stopped
